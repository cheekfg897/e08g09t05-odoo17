trigger:
  branches:
    include:
      - Staging
      - master

pool:
  name: Default

variables:
  repoUrl: 'https://github.com/cheekfg897/e08g09t05-odoo17'
  updateScript: '/home/azureuser/e08g09t05-odoo17/update_code.sh'
  stagePath: '/home/azureuser/'

stages:

# =========================
# STAGING STAGE
# =========================
- stage: Staging
  displayName: Deploy to Staging
  condition: eq(variables['Build.SourceBranchName'], 'Staging')

  jobs:
  - deployment: DeployStaging
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Staging"
            inputs:
              sshEndpoint: 'ssh-esmos-staging'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                if [ -d "e08g09t05-odoo17/.git" ]; then
                  cd e08g09t05-odoo17
                  git fetch origin --quiet
                  git reset --hard origin/Staging
                  git clean -fd
                else
                  git clone -b Staging $(repoUrl) e08g09t05-odoo17 --quiet
                  cd e08g09t05-odoo17
                fi
                rm -f .DS_Store
                rm -rf .github

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Staging"
            inputs:
              sshEndpoint: 'ssh-esmos-staging'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)


# =========================
# PRODUCTION STAGE
# =========================
- stage: Production
  displayName: Deploy to Production
  condition: eq(variables['Build.SourceBranchName'], 'master')

  jobs:
  - deployment: DeployProduction
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:

          # Sync code
          - task: SSH@0
            displayName: "Sync Code - Production"
            inputs:
              sshEndpoint: 'ssh-esmos-prod'
              runOptions: commands
              commands: |
                set -e
                echo "Deploying branch: $(Build.SourceBranchName)"
                cd $(stagePath)
                if [ -d "e08g09t05-odoo17/.git" ]; then
                  cd e08g09t05-odoo17
                  git fetch origin --quiet
                  git reset --hard origin/master
                  git clean -fd
                else
                  git clone -b master $(repoUrl) e08g09t05-odoo17 --quiet
                  cd e08g09t05-odoo17
                fi
                rm -f .DS_Store
                rm -rf .github

          # Run update script
          - task: SSH@0
            displayName: "Run Update Script - Production"
            inputs:
              sshEndpoint: 'ssh-esmos-prod'
              runOptions: commands
              commands: |
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' chmod +x $(updateScript)
                echo "$(STAGINGUSERPASSWORD)" | sudo -S -p '' $(updateScript)
