# ── Odoo (esmos.internal / localhost) ──────────────────────────
#
# Local testing:  http://localhost        → Odoo
#                 http://localhost:8080   → Moodle (direct, bypasses nginx)
#
# With /etc/hosts entries you can also use:
#   esmos.internal           → Odoo
#   training.esmos.internal  → Moodle
#   helpdesk.esmos.internal  → Odoo Helpdesk

upstream odoo_backend {
    server odoo:8069;
}

upstream moodle_backend {
    server moodle:80;
}

# ── Default server — routes to Odoo ───────────────────────────
server {
    listen 80 default_server;
    server_name esmos.internal localhost;

    client_max_body_size 200m;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://odoo_backend;
        proxy_redirect off;
    }

    location /longpolling {
        proxy_pass http://odoo_backend;
    }

    # Gzip for Odoo static assets
    location ~* /web/static/ {
        proxy_pass http://odoo_backend;
        expires 14d;
        access_log off;
    }
}

# ── Moodle — training.esmos.internal ─────────────────────────
server {
    listen 80;
    server_name training.esmos.internal;

    client_max_body_size 200m;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://moodle_backend;
        proxy_redirect off;
    }
}

# ── Helpdesk — helpdesk.esmos.internal ───────────────────────
server {
    listen 80;
    server_name helpdesk.esmos.internal;

    client_max_body_size 200m;
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://odoo_backend;
        proxy_redirect off;
    }
}
